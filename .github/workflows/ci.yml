name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sim-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator yosys

      - name: Simulation, smokes, elab-fail, Verilator, Yosys syn + formal
        run: make -C test ci
