name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sim-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator

      - name: Main testbench + parameter smoke + Verilator lint
        run: make -C test ci
